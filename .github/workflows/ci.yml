name: CI

# Type-check / build gate for pull requests and pushes to non-main branches.
# (Pushes to main are built + published by auto-release.yml instead.)
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # --ignore-scripts skips native rebuilds (better-sqlite3/sharp) we don't need
      # just to type-check; tsc only reads the @types packages.
      - run: npm ci --ignore-scripts
      - run: npm run build
